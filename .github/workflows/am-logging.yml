name: AM Logging Service Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  publish-logging:
    name: Publish Logging Service
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: "python"
      working_directory: "."
      image_name: "am-logging"
      build_context: "./service"
      preprod_namespace: "am-apps-preprod"
      prod_namespace: "am-apps-prod"
      deploy_prod: false
    secrets: inherit
