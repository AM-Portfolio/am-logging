name: Logging CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: am-portfolio
  SERVICE_NAME: am-logging-svc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.SERVICE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.run_id }}
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: powershell
        run: |
          $sha = $env:GITHUB_SHA.Substring(0,7)
          echo "sha_short=$sha" >> $env:GITHUB_OUTPUT

      - name: Ensure namespace exists
        shell: powershell
        run: |
          $ns = "am-apps-preprod"
          if (-not (kubectl get namespace $ns -o name 2>$null)) {
            kubectl create namespace $ns
          }

      - name: Deploy logging service to K8s
        shell: powershell
        run: |
          helm upgrade --install am-logging ./helm `
            --namespace am-apps-preprod `
            --create-namespace `
            --set global.image.registry="${{ env.REGISTRY }}/${{ env.OWNER }}" `
            --set global.image.tag="${{ github.run_id }}"

      - name: Verify Rollout
        shell: powershell
        run: |
          $ns = "am-apps-preprod"
          $deployments = @("am-logging-svc")
          $timeout = "10m"
          $failed = $false

          foreach ($dep in $deployments) {
            Write-Host "⏳ Waiting for rollout: $dep ..."
            kubectl rollout status deployment/$dep -n $ns --timeout=$timeout
            if ($LASTEXITCODE -ne 0) {
              Write-Host "❌ Rollout FAILED for $dep"
              $failed = $true
            } else {
              Write-Host "✅ $dep is healthy"
            }
          }

          if ($failed) {
            Write-Host ""
            Write-Host "=== Pod Status ==="
            kubectl get pods -n $ns
            Write-Host ""
            Write-Host "=== Recent Events ==="
            kubectl get events -n $ns --sort-by='.lastTimestamp' | Select-Object -Last 20
            exit 1
          }

      - name: Rollout Summary (on failure)
        if: failure()
        shell: powershell
        run: |
          Write-Host "🔍 Deployment failed. Full pod diagnostics:"
          kubectl get pods -n am-apps-preprod -o wide
          Write-Host ""
          Write-Host "--- Describe: am-logging-svc ---"
          kubectl describe deployment/am-logging-svc -n am-apps-preprod 2>&1 | Select-Object -Last 30
