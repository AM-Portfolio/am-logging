apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-svc
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.global.vault.role | quote }}
        vault.hashicorp.com/auth-path: {{ .Values.global.vault.authPath | quote }}
        
        # Injecting Redis Secrets
        vault.hashicorp.com/agent-inject-secret-redis: {{ .Values.global.vault.secrets.redis | quote }}
        vault.hashicorp.com/agent-inject-template-redis: |
          {{`{{`}}- with secret {{ .Values.global.vault.secrets.redis | quote }} {{`}}` text:""}}
          {{`{{`}}- range $k, $v := .Data.data {{`}}` text:""}}
          export {{`{{`}} $k {{`}}` text:""}}="{{`{{`}} $v {{`}}` text:""}}"
          {{`{{`}} end {{`}}` text:""}}
          {{`{{`}} end {{`}}` text:""}}

        # Injecting MongoDB Secrets
        vault.hashicorp.com/agent-inject-secret-mongodb: {{ .Values.global.vault.secrets.mongodb | quote }}
        vault.hashicorp.com/agent-inject-template-mongodb: |
          {{`{{`}}- with secret {{ .Values.global.vault.secrets.mongodb | quote }} {{`}}` text: ""}}
          {{`{{`}}- range $k, $v := .Data.data {{`}}` text: ""}}
          export {{`{{`}} $k {{`}}` text: ""}}="{{`{{`}} $v {{`}}` text: ""}}"
          {{`{{`}} end {{`}}` text: ""}}
          {{`{{`}} end {{`}}` text: ""}}

        # Injecting Loki Secrets
        vault.hashicorp.com/agent-inject-secret-loki: {{ .Values.global.vault.secrets.loki | quote }}
        vault.hashicorp.com/agent-inject-template-loki: |
          {{`{{`}}- with secret {{ .Values.global.vault.secrets.loki | quote }} {{`}}` text: ""}}
          {{`{{`}}- range $k, $v := .Data.data {{`}}` text: ""}}
          export {{`{{`}} $k {{`}}` text: ""}}="{{`{{`}} $v {{`}}` text: ""}}"
          {{`{{`}} end {{`}}` text: ""}}
          {{`{{`}} end {{`}}` text: ""}}
    spec:
      serviceAccountName: {{ .Chart.Name }}-vault-sa
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.global.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Source secrets injected by Vault Agent sidecar
            . /vault/secrets/redis 2>/dev/null || true
            . /vault/secrets/mongodb 2>/dev/null || true
            . /vault/secrets/loki 2>/dev/null || true
            exec uvicorn main:app --host 0.0.0.0 --port {{ .Values.service.targetPort }}
        env:
        - name: ENVIRONMENT
          value: {{ .Values.environment | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
