# Local development values for am-logging
# These values are used for local Helm deployment

environment: local
namespace: am-logging-local

global:
  isLocal: true
  image:
    registry: "local"
    pullPolicy: Never
    tag: "latest"

  vault:
    enabled: false
    # Use host.docker.internal to reach vault running on the host
    address: "http://host.docker.internal:8200"

env:
  MONGODB_URL: "mongodb://host.docker.internal:27017/portfolio?authSource=admin"
  REDIS_URL: "redis://:RedisPassword123!@host.docker.internal:6379/0"
  LOKI_URL: "http://host.docker.internal:3100"

replicaCount: 1

image:
  repository: am-logging-svc
  tag: "latest"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
