# Prod overrides
env:
  ENVIRONMENT: "prod"

vault:
  secretPaths:
    mongodb:
      path: "apps/data/prod/infra/mongodb"
    redis:
      path: "apps/data/prod/infra/redis"

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: am.munish.org
      paths:
        - path: /logs
          pathType: Prefix
