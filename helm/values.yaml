# ==============================================================================
# am-logging Helm Chart — Base Values
# ==============================================================================

replicaCount: 1
port: 8000
language: python
entrypoint: "exec uvicorn main:app --host 0.0.0.0 --port 8000"

image:
  repository: am-logging
  pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

security:
  automountServiceAccountToken: true

vault:
  enabled: true
  role: "am-backend-role"
  secretPaths:
    mongodb:
      path: "apps/data/preprod/infra/mongodb"
    redis:
      path: "apps/data/preprod/infra/redis"

env:
  ENVIRONMENT: "preprod"
  LOG_LEVEL: "INFO"
  PORT: "8000"
