# ==============================================================================
# am-logging Helm Chart — Base Values
#
# DESIGN PRINCIPLE:
#   ALL sensitive runtime config (URLs, credentials) comes from HashiCorp Vault.
# ==============================================================================

environment: local
namespace: am-apps-preprod

# Global configuration emulating the am-auth pattern
global:
  isLocal: false
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: IfNotPresent
    tag: "latest"

  vault:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"
    role: "am-auth"
    authPath: "auth/kubernetes"
    # KV v2 paths for secrets
    secrets:
      redis:   "secret/data/am-logging/local/redis"
      mongodb: "secret/data/am-logging/local/mongodb"
      loki:    "secret/data/am-logging/local/loki"

# Service-specific configuration
replicaCount: 1

image:
  repository: am-logging
  tag: "latest"

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

# Non-sensitive resources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "300m"
