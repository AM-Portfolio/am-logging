# Local development values for am-logging
# These values are used for local Helm deployment

environment: local
namespace: am-apps-local

global:
  isLocal: true
  image:
    registry: "local"
    pullPolicy: Never
    tag: "latest"

  vault:
    enabled: false
    # Use host.docker.internal to reach vault running on the host
    address: "http://host.docker.internal:8200"

env: {}
  # Env vars injected from .env by deploy_local.py
  # MONGO_URL
  # REDIS_URL
  # LOKI_URL

replicaCount: 1

image:
  repository: am-logging
  tag: "latest"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
